<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregunta</title>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
    text-align:center;
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}
    text-align:center;
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
}
.fondo-corazon{
    position:absolute;
    font-size:20px;
    opacity:0.2;
    animation:flotar 10s linear infinite;
}

@keyframes flotar{
    0%{
        transform:translateY(100vh);
    }
    100%{
        transform:translateY(-100vh);
    }
}
.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:30px;
}

button{
    font-size:18px;
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#si{
    background:#ff4d6d;
    color:white;
}

#no{
    background:#ccc;
    position:absolute;
}

#mensaje{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.corazon{
    position:fixed;
    font-size:30px;
    animation:subir 3s linear forwards;
}

@keyframes subir{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-600px);
        opacity:0;
    }
}

</style>

<script>

function decirSi(){

    document.getElementById("mensaje").innerHTML =
    "❤️ ¡Perfecto! Entonces entrenamos mañana a las 5 ";

    for(let i=0;i<150;i++){
    crearCorazon();
}

}

function moverNo(){

    let x=Math.random()*window.innerWidth*0.8;
    let y=Math.random()*window.innerHeight*0.8;

    let boton=document.getElementById("no");
    boton.style.left=x+"px";
    boton.style.top=y+"px";

}

function crearCorazon(){

    let corazon=document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML="❤️";

    corazon.style.left=Math.random()*window.innerWidth+"px";
    corazon.style.bottom="0px";

    document.body.appendChild(corazon);

    setTimeout(()=>{
        corazon.remove();
    },3000);

}

</script>

</head>

<body>

<div class="container">

<h1>¿Quieres entrenar conmigo el lunes?</h1>

<button id="si" onclick="decirSi()">Sí</button>
<button id="no" onmouseover="moverNo()">No</button>

<div id="mensaje"></div>

</div>

</body>
</html>
