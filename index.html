<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregunta</title>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
    text-align:center;
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* tarjeta central */

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    z-index:2;
}

/* botones */

button{
    font-size:18px;
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* botón SI brillante */

#si{
    background:#ff4d6d;
    color:white;
    animation:brillo 1.5s infinite alternate;
}

@keyframes brillo{
    from{
        box-shadow:0 0 10px #ff4d6d;
    }
    to{
        box-shadow:0 0 30px #ff4d6d,0 0 50px #ff8fa3;
    }
}

#no{
    background:#ccc;
    position:absolute;
}

/* corazones flotando */

.fondo-corazon{
    position:absolute;
    font-size:20px;
    opacity:0.3;
    animation:flotar linear infinite;
}

@keyframes flotar{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-10vh);
    }
}

/* corazones explosión */

.corazon{
    position:fixed;
    font-size:30px;
    animation:explosion 2s forwards;
}

@keyframes explosion{
    0%{
        transform:scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(-300px) scale(2);
        opacity:0;
    }
}

#mensaje{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

</style>

<script>

/* botón SI */

function decirSi(){

document.getElementById("mensaje").innerHTML =
"❤️ ¡Perfecto! Entonces entrenamos mañana a las 5";

for(let i=0;i<120;i++){
crearExplosion();
}

}

/* mover botón NO */

function moverNo(){

let x=Math.random()*window.innerWidth*0.8;
let y=Math.random()*window.innerHeight*0.8;

let boton=document.getElementById("no");
boton.style.left=x+"px";
boton.style.top=y+"px";

}

/* explosión de corazones */

function crearExplosion(){

let corazon=document.createElement("div");

corazon.classList.add("corazon");
corazon.innerHTML="❤️";

corazon.style.left=Math.random()*window.innerWidth+"px";
corazon.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},2000);

}

/* corazones del fondo */

function fondoCorazones(){

for(let i=0;i<40;i++){

let corazon=document.createElement("div");

corazon.classList.add("fondo-corazon");
corazon.innerHTML="❤️";

corazon.style.left=Math.random()*window.innerWidth+"px";
corazon.style.animationDuration=(5+Math.random()*10)+"s";

document.body.appendChild(corazon);

}

}

window.onload=fondoCorazones;

</script>

</head>

<body>

<div class="container">

<h1>¿Quieres entrenar conmigo mañana?</h1>

<button id="si" onclick="decirSi()">Sí</button>
<button id="no" onmouseover="moverNo()">No</button>

<div id="mensaje"></div>

</div>

</body>
</html>
